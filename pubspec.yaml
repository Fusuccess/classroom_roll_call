name: classroom_roll_call
description: 课堂点名应用
publish_to: 'none'
version: 1.0.3+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.0
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 路由
  go_router: ^13.0.0
  
  # UI组件
  cupertino_icons: ^1.0.6
  
  # 工具库
  uuid: ^4.3.3
  intl: ^0.19.0
  
  # 文件处理
  csv: ^6.0.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
